<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">LumaForge 光铸 favicon</title>
  <desc id="desc">深色科技光核图标，中心为 AI 字标，外层带有蓝绿色轨道光环。</desc>
  <defs>
    <radialGradient id="bgGlow" cx="34%" cy="24%" r="76%">
      <stop offset="0" stop-color="#1f3b64" />
      <stop offset="0.46" stop-color="#0b1020" />
      <stop offset="1" stop-color="#060914" />
    </radialGradient>
    <linearGradient id="edge" x1="10" y1="7" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc" />
      <stop offset="0.48" stop-color="#60a5fa" />
      <stop offset="1" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 深色圆角底板保证浏览器标签页、收藏栏和深浅主题中都有足够对比。 -->
  <rect x="4" y="4" width="56" height="56" rx="15" fill="url(#bgGlow)" />
  <rect x="5.5" y="5.5" width="53" height="53" rx="13.5" fill="none" stroke="url(#edge)" stroke-width="1.5" opacity="0.78" />

  <!-- 轨道与光核呼应网页里的“AI visual foundry / 光铸”科技感。 -->
  <g filter="url(#softGlow)">
    <ellipse cx="32" cy="32" rx="21" ry="9.5" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.72" transform="rotate(-24 32 32)" />
    <ellipse cx="32" cy="32" rx="21" ry="9.5" fill="none" stroke="#2dd4bf" stroke-width="1.65" opacity="0.62" transform="rotate(28 32 32)" />
    <circle cx="32" cy="32" r="12.5" fill="#0f172a" stroke="#7dd3fc" stroke-width="1.4" />
    <circle cx="42.5" cy="21.5" r="3" fill="#2dd4bf" />
  </g>

  <text x="32" y="38.5" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="850" letter-spacing="-0.8" fill="#f8fafc">AI</text>
</svg>